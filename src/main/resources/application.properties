# Configuración de la base de datos usando variables de entorno de Railway
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Se elimina el dialecto específico para que Hibernate 6 lo detecte automáticamente
# Esto evita la advertencia HHH90000025 que aparecía en tus logs.

# Configuración de Thymeleaf
spring.thymeleaf.cache=false