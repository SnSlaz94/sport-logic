<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Jugador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 th:text="${jugador.id_jugador != null} ? 'Editar Jugador' : 'Nuevo Jugador'"></h2>

    <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post">
        <div class="mb-3">
            <label class="form-label">Persona</label>
            <select class="form-control" th:field="*{persona.id_persona}">
                <option th:each="p : ${personas}" th:value="${p.id_persona}" 
                        th:text="${p.nombre + ' ' + p.apellido}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Posición en el campo</label>
            <input type="text" class="form-control" th:field="*{posicion_campo}" placeholder="Ej: Delantero" required>
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/jugadores}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
