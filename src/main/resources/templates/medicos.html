<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Médicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Gestión de Médicos</h2>

    <a th:href="@{/medicos/nuevo}" class="btn btn-primary mb-3">Nuevo Médico</a>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Especialidad</th>
                <th>Teléfono</th>
                <th>Email</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="medico : ${medicos}">
                <td th:text="${medico.id_medico}"></td>
                <td th:text="${medico.nombre}"></td>
                <td th:text="${medico.especialidad}"></td>
                <td th:text="${medico.telefono}"></td>
                <td th:text="${medico.email}"></td>
                <td>
                    <a th:href="@{'/medicos/editar/' + ${medico.id_medico}}" class="btn btn-sm btn-warning me-1">Editar</a>
                    <a th:href="@{'/medicos/eliminar/' + ${medico.id_medico}}" class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Está seguro de eliminar este médico?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <a th:href="@{/inicio}" class="btn btn-secondary mt-3">Volver</a>
</div>
</body>
</html>
