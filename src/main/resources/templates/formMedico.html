<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${medico.id_medico != null} ? 'Editar Médico' : 'Nuevo Médico'">Formulario Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 th:text="${medico.id_medico != null} ? 'Editar Médico' : 'Nuevo Médico'"></h2>

    <form th:action="@{/medicos/guardar}" th:object="${medico}" method="post">
        <input type="hidden" th:field="*{id_medico}" />

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" th:field="*{nombre}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Especialidad</label>
            <input type="text" class="form-control" th:field="*{especialidad}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" class="form-control" th:field="*{telefono}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" required>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/medicos}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
