<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Login SportLogic</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">SportLogic</h3>

<h5 class="text-center mb-3">Ingreso al sistema</h5>

<!-- ERROR LOGIN -->

<div th:if="${param.error}" class="alert alert-danger">
Usuario o contraseña incorrectos
</div>

<!-- LOGOUT -->

<div th:if="${param.logout}" class="alert alert-success">
Sesión cerrada correctamente
</div>

<form th:action="@{/login}" method="post">
    <div class="form-floating mb-3">
        <input type="text" name="username" class="form-control" id="userInput" placeholder="Usuario" required>
        <label for="userInput text-muted">Usuario</label>
    </div>
    <div class="form-floating mb-3">
        <input type="password" name="password" class="form-control" id="passInput" placeholder="Contraseña" required>
        <label for="passInput" class="text-muted">Contraseña</label>
    </div>
    <div class="d-grid">
        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Ingresar</button>
    </div>
</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
