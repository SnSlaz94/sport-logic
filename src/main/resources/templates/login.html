<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Login SportLogic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-block-size: 100vh;
            display: flex;
            align-items: center;
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                
                <div class="text-center mb-4">
                    <img src="images/logo.jpg" alt="Logo SportLogic" 
                         class="img-fluid rounded-circle shadow-sm" 
                         style="inline-size: 120px; block-size: 120px; object-fit: cover; border: 4px solid white;">
                </div>

                <div class="card shadow-lg border-0">
                    <div class="card-body p-4 p-sm-5"> <h2 class="text-center mb-1 fw-bold">SportLogic</h2>
                        <p class="text-center text-muted mb-4">Gestión Deportiva</p>
                        
                        <hr class="my-4 text-secondary">

                        <div th:if="${param.error}" class="alert alert-danger py-3">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i> Datos incorrectos
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="form-floating mb-3">
                                <input type="text" name="username" class="form-control" id="userInput" placeholder="Usuario" required>
                                <label for="userInput">Usuario</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" name="password" class="form-control" id="passInput" placeholder="Contraseña" required>
                                <label for="passInput">Contraseña</label>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg py-3 shadow">
                                    <strong>INGRESAR</strong>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <p class="text-center text-muted mt-4 small">&copy; 2026 SportLogic</p>
            </div>
        </div>
    </div>

</body>
</html>
