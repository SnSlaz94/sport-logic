<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login SportLogic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-4">
                <div class="text-center mb-4">
                    <img src="images/logo.jpg" alt="Logo SportLogic" 
                         class="img-fluid rounded-circle shadow-sm" 
                         style="inline-size: 100px; block-size: 100px; object-fit: cover; border: 3px solid white;">
                </div>

                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-1 fw-bold">SportLogic</h3>
                        <p class="text-center text-muted mb-4">Gestión Deportiva Integral</p>
                        
                        <h5 class="text-center mb-3">Ingreso al sistema</h5>

                        <div th:if="${param.error}" class="alert alert-danger py-2 small">
                            Usuario o contraseña incorrectos
                        </div>

                        <div th:if="${param.logout}" class="alert alert-success py-2 small">
                            Sesión cerrada correctamente
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="form-floating mb-3">
                                <input type="text" name="username" class="form-control" id="userInput" placeholder="Usuario" required>
                                <label for="userInput" class="text-muted">Usuario</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" name="password" class="form-control" id="passInput" placeholder="Contraseña" required>
                                <label for="passInput" class="text-muted">Contraseña</label>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg shadow-sm">Ingresar</button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <p class="text-center text-muted mt-4 small">&copy; 2026 SportLogic - Sistema de Gestión</p>
            </div>
        </div>
    </div>

</body>
</html>
