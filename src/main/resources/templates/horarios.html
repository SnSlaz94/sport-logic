<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Horarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Gestión de Horarios</h2>
    <a th:href="@{/horarios/nuevo}" class="btn btn-primary mb-3">Nuevo Horario</a>
    
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Día de la Semana</th>
                <th>Hora Inicio</th>
                <th>Hora Fin</th>
                <th>Lugar</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="horario : ${horarios}">
                <td th:text="${horario.id_horario}"></td>
                <td th:text="${horario.dia_semana}"></td>
                <td th:text="${horario.hora_inicio}"></td>
                <td th:text="${horario.hora_fin}"></td>
                <td th:text="${horario.lugar}"></td>
                <td>
                    <a th:href="@{'/horarios/editar/' + ${horario.id_horario}}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{'/horarios/eliminar/' + ${horario.id_horario}}" class="btn btn-sm btn-danger" 
                       onclick="return confirm('¿Está seguro de eliminar este horario?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <a th:href="@{/entrenamientos}" class="btn btn-secondary mt-3">Volver al módulo</a>
</div>
</body>
</html>
