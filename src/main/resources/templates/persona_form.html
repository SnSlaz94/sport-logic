<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Formulario Persona</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Formulario Persona</h2>

<form th:action="@{/personas/guardar}" th:object="${persona}" method="post">

<input type="hidden" th:field="*{id_persona}"/>

<div class="mb-3">
<label>Nombre</label>
<input type="text" th:field="*{nombre}" class="form-control" required>
</div>

<div class="mb-3">
<label>Apellido</label>
<input type="text" th:field="*{apellido}" class="form-control" required>
</div>

<div class="mb-3">
<label>Documento</label>
<input type="text" th:field="*{documento}" class="form-control" required>
</div>

<div class="mb-3">
<label>Fecha Nacimiento</label>
<input type="date" th:field="*{fecha_nacimiento}" class="form-control">
        <span th:if="${#fields.hasErrors('fecha_nacimiento')}" 
              th:errors="*{fecha_nacimiento}" 
              style="color: red;">
            Fecha inválida
        </span>
</div>

<div class="mb-3">
<label>Teléfono</label>
<input type="text" th:field="*{telefono}" class="form-control">
</div>

<div class="mb-3">
<label>Dirección</label>
<input type="text" th:field="*{direccion}" class="form-control">
</div>

<button type="submit" class="btn btn-success">Guardar</button>

<a href="/personas" class="btn btn-secondary">Cancelar</a>

</form>

</div>

</body>
</html>
