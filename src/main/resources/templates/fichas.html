<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Fichas Médicas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Gestión de Fichas Médicas</h2>

    <a th:href="@{/fichas/nuevo}" class="btn btn-primary mb-3">Nueva Ficha Médica</a>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Jugador</th>
                <th>Médico</th>
                <th>Historial Clínico</th>
                <th>Observaciones</th>
                <th>Fecha Revisión</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ficha : ${fichas}">
                <td th:text="${ficha.id_ficha}"></td>
                <td th:text="${ficha.jugador.persona.nombre + ' ' + ficha.jugador.persona.apellido}"></td>
                <td th:text="${ficha.medico.nombre}"></td>
                <td th:text="${ficha.historialClinico}"></td>
                <td th:text="${ficha.observaciones}"></td>
                <td th:text="${ficha.fechaRevision}"></td>
                <td>
                    <a th:href="@{'/fichas/editar/' + ${ficha.id_ficha}}" class="btn btn-sm btn-warning me-1">Editar</a>
                    <a th:href="@{'/fichas/eliminar/' + ${ficha.id_ficha}}" class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Está seguro de eliminar esta ficha?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <a th:href="@{/inicio}" class="btn btn-secondary mt-3">Volver</a>
</div>
</body>
</html>
