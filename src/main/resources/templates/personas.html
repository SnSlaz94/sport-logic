<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Gestión de Personas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Gestión de Personas</h2>

<a href="/personas/nuevo" class="btn btn-primary mb-3">Nueva Persona</a>

<table class="table table-bordered">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Apellido</th>
<th>Documento</th>
<th>Teléfono</th>
<th>Acciones</th>
</tr>

</thead>

<tbody>

<tr th:each="persona : ${personas}">

<td th:text="${persona.id_persona}"></td>
<td th:text="${persona.nombre}"></td>
<td th:text="${persona.apellido}"></td>
<td th:text="${persona.documento}"></td>
<td th:text="${persona.telefono}"></td>

<td>

<a th:href="@{/personas/editar/{id}(id=${persona.id_persona})}" class="btn btn-warning btn-sm">Editar</a>

<a th:href="@{/personas/eliminar/{id}(id=${persona.id_persona})}" class="btn btn-danger btn-sm">Eliminar</a>

</td>

</tr>

</tbody>

</table>

<a href="/inicio" class="btn btn-secondary">Volver</a>

</div>

</body>
</html>
