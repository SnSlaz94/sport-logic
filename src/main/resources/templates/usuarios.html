<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Gestión de Usuarios</h2>

    <a th:href="@{/usuarios/nuevo}" class="btn btn-primary mb-3">Nuevo Usuario</a>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Persona</th>
                <th>Rol</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="usuario : ${usuarios}">
                <td th:text="${usuario.id_usuario}"></td>
                <td th:text="${usuario.username}"></td>
                <td th:text="${usuario.email}"></td>
                <td th:text="${usuario.persona?.nombre ?: 'Sin nombre'}"></td>
                <td th:text="${usuario.rol?.nombre_rol ?: 'Sin rol'}"></td>
                <td>
                    <a th:href="@{'/usuarios/editar/' + ${usuario.id_usuario}}" class="btn btn-sm btn-warning me-1">Editar</a>
                    <a th:href="@{'/usuarios/eliminar/' + ${usuario.id_usuario}}" class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Está seguro de eliminar este usuario?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <a th:href="@{/inicio}" class="btn btn-secondary mt-3">Volver</a>
</div>
</body>
</html>
