<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Jugadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Gestión de Jugadores</h2>

    <a th:href="@{/jugadores/nuevo}" class="btn btn-primary mb-3">Nuevo Jugador</a>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Posición</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="jugador : ${jugadores}">
                <td th:text="${jugador.id_jugador}"></td>
                <td th:text="${jugador.persona != null} ? ${jugador.persona.nombre} : 'Sin asignar'"></td>
                <td th:text="${jugador.posicion_campo}"></td>
                <td>
                    <a th:href="@{'/jugadores/editar/' + ${jugador.id_jugador}}" class="btn btn-sm btn-warning me-1">Editar</a>
                    <a th:href="@{'/jugadores/eliminar/' + ${jugador.id_jugador}}" class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Está seguro de eliminar este jugador?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <a th:href="@{/inicio}" class="btn btn-secondary mt-3">Volver</a>
</div>
</body>
</html>
