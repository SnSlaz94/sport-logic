<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="main-layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportLogic - Gestión Deportiva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .card-hover:hover { transform: translateY(-5px); transition: 0.3s; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/inicio"><i class="bi bi-trophy-fill me-2"></i>SportLogic</a>
            <div class="d-flex align-items-center">
                <span class="text-light me-3" sec:authentication="name">Usuario</span>
                <a href="/mi-perfil" class="btn btn-outline-light btn-sm me-2">Perfil</a>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button class="btn btn-danger btn-sm">Salir</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div th:replace="${content}"></div>
    </main>

    <footer class="text-center py-4 text-muted">
        <small>&copy; 2026 SportLogic - Sistema de de Informacion de Gestión de Deportiva</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
