<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Sesiones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Gestión de Sesiones</h2>
    <a th:href="@{/sesiones/nuevo}" class="btn btn-primary mb-3">Nueva Sesión</a>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID Sesión</th>
                <th>Horario</th>
                <th>Objetivo</th>
                <th>Descripción</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="sesion : ${sesiones}">
                <td th:text="${sesion.id_sesion}"></td>
                <td th:text="${sesion.horario.dia_semana + ' ' + sesion.horario.hora_inicio + '-' + sesion.horario.hora_fin}"></td>
                <td th:text="${sesion.objetivo_sesion}"></td>
                <td th:text="${sesion.descripcion_actividades}"></td>
                <td th:text="${#temporals.format(sesion.fecha, 'dd/MM/yyyy')}"></td>
                <td>
                    <a th:href="@{'/sesiones/editar/' + ${sesion.id_sesion}}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{'/sesiones/eliminar/' + ${sesion.id_sesion}}" class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Está seguro de eliminar esta sesión?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <a th:href="@{/entrenamientos}" class="btn btn-secondary mt-3">Volver al módulo</a>
</div>
</body>
</html>
