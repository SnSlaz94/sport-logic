<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Sesiones - Sport Logic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Gestión de Sesiones de Entrenamiento</h2>
    
    <div sec:authorize="hasAnyRole('ADMIN','ENTRENADOR')">
        <a th:href="@{/sesiones/nuevo}" class="btn btn-success mb-3">Nueva Sesión</a>
    </div>

    <table class="table table-striped shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Horario</th>
                <th>Objetivo</th>
                <th>Descripción</th>
                <th>Fecha</th>
                <th sec:authorize="hasAnyRole('ADMIN','ENTRENADOR')">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="sesion : ${sesiones}">
                <td th:text="${sesion.id_sesion}"></td>
                <td th:text="${sesion.horario?.dia_semana + ' ' + sesion.horario?.hora_inicio + '-' + sesion.horario?.hora_fin}"></td>
                <td th:text="${sesion.objetivo_sesion}"></td>
                <td th:text="${sesion.descripcion_actividades}"></td>
                <td th:text="${#temporals.format(sesion.fecha, 'dd/MM/yyyy')}"></td>
                
                <td sec:authorize="hasAnyRole('ADMIN','ENTRENADOR')">
                    <a th:href="@{/sesiones/editar/{id}(id=${sesion.id_sesion})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/sesiones/eliminar/{id}(id=${sesion.id_sesion})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Está seguro de eliminar esta sesión?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a sec:authorize="hasRole('DEPORTISTA')" 
           th:href="@{/inicio}" 
           class="btn btn-secondary">
           <i class="bi bi-arrow-left"></i> Volver al Inicio
        </a>

        <a sec:authorize="hasAnyRole('ADMIN','DIRECTIVO','ENTRENADOR','MEDICO')" 
           th:href="@{/entrenamientos}" 
           class="btn btn-secondary">
           <i class="bi bi-arrow-left"></i> Volver al Módulo
        </a>
    </div>
</div>
</body>
</html>
