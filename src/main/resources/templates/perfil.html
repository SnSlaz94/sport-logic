<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Mi Perfil | SportLogic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/inicio}"><i class="bi bi-trophy-fill me-2"></i>SportLogic</a>
            <a th:href="@{/inicio}" class="btn btn-outline-light btn-sm">Volver</a>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <h2 class="text-center mb-4">Perfil de Usuario</h2>

        <div class="card shadow border-0">
            <div class="card-body p-4">

                <div class="mb-4">
                    <h4 class="text-primary"><i class="bi bi-person-badge me-2"></i>Información de Cuenta</h4>
                    <p><strong>Usuario:</strong> <span th:text="${usuario != null ? usuario.username : 'No disponible'}"></span></p>
                    <p><strong>Rol:</strong> <span th:text="${usuario?.rol?.nombre_rol}"></span></p>

                    <hr>

                    <p><strong>Nombre:</strong> <span th:text="${persona?.nombre}"></span></p>
                    <p><strong>Apellido:</strong> <span th:text="${persona?.apellido}"></span></p>
                    <p><strong>Documento:</strong> <span th:text="${persona?.documento}"></span></p>
                    <p><strong>Email:</strong> <span th:text="${usuario?.email}"></span></p>
                </div>

                <div sec:authorize="hasAuthority('DEPORTISTA')">
                    
                    <div th:if="${jugador != null}">
                        <hr>
                        <h4 class="text-primary"><i class="bi bi-dribbble me-2"></i>Información Deportiva</h4>
                        <p><strong>Posición en el campo:</strong> <span th:text="${jugador.posicion_campo}"></span></p>
                    </div>

                    <div th:if="${ficha != null}">
                        <hr>
                        <h4 class="text-primary"><i class="bi bi-heart-pulse me-2"></i>Ficha Médica</h4>
                        <div class="bg-white p-3 border rounded">
                            <p><strong>Historial Clínico:</strong> <span th:text="${ficha.historialClinico}"></span></p>
                            <p><strong>Observaciones:</strong> <span th:text="${ficha.observaciones}"></span></p>
                            <p><strong>Fecha de revisión:</strong> <span th:text="${#temporals.format(ficha.fechaRevision, 'dd/MM/yyyy')}"></span></p>
                        </div>
                    </div>
                    
                    <div th:if="${ficha == null}" class="alert alert-warning mt-3">
                        <i class="bi bi-exclamation-triangle me-2"></i>Aún no tienes una ficha médica registrada.
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
